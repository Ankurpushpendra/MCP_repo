<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Products - ShopApp</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Manage Products</h2>
        <a th:href="@{/admin/products/new}" class="btn btn-primary">+ Add Product</a>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>Stock</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="product : ${products}">
                        <td th:text="${product.id}"></td>
                        <td th:text="${product.name}"></td>
                        <td th:text="${product.categoryName}"></td>
                        <td th:text="'$' + ${#numbers.formatDecimal(product.price, 1, 2)}"></td>
                        <td>
                            <span th:text="${product.stockQuantity}"
                                  th:classappend="${product.stockQuantity == 0} ? 'text-danger fw-bold'"></span>
                        </td>
                        <td>
                            <a th:href="@{/admin/products/{id}/edit(id=${product.id})}"
                               class="btn btn-outline-primary btn-sm">Edit</a>
                            <form th:action="@{/admin/products/{id}/delete(id=${product.id})}" method="post" class="d-inline"
                                  onsubmit="return confirm('Delete this product?')">
                                <button type="submit" class="btn btn-outline-danger btn-sm">Delete</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
