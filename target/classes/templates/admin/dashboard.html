<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - ShopApp</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
    <h2 class="mb-4">Admin Dashboard</h2>

    <div class="row g-4 mb-4">
        <div class="col-md-4">
            <div class="card text-white bg-primary shadow">
                <div class="card-body text-center py-4">
                    <h1 th:text="${totalProducts}">0</h1>
                    <p class="mb-0">Total Products</p>
                </div>
                <div class="card-footer text-center">
                    <a th:href="@{/admin/products}" class="text-white">Manage Products →</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-white bg-success shadow">
                <div class="card-body text-center py-4">
                    <h1 th:text="${totalCategories}">0</h1>
                    <p class="mb-0">Categories</p>
                </div>
                <div class="card-footer text-center">
                    <a th:href="@{/admin/categories}" class="text-white">Manage Categories →</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-white bg-info shadow">
                <div class="card-body text-center py-4">
                    <h1 th:text="${totalUsers}">0</h1>
                    <p class="mb-0">Registered Users</p>
                </div>
                <div class="card-footer text-center">
                    <a th:href="@{/admin/users}" class="text-white">Manage Users →</a>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-3">
        <div class="col-md-4">
            <a th:href="@{/admin/products/new}" class="btn btn-outline-primary w-100 py-3">+ Add New Product</a>
        </div>
        <div class="col-md-4">
            <a th:href="@{/admin/categories/new}" class="btn btn-outline-success w-100 py-3">+ Add New Category</a>
        </div>
        <div class="col-md-4">
            <a th:href="@{/orders}" class="btn btn-outline-info w-100 py-3">View All Orders</a>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
