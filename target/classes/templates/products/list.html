<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Products - ShopApp</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
    <h2 class="mb-4">Products</h2>

    <!-- Search & Filter -->
    <form th:action="@{/products}" method="get" class="row g-2 mb-4">
        <div class="col-md-5">
            <input type="text" name="search" class="form-control" placeholder="Search products..."
                   th:value="${search}">
        </div>
        <div class="col-md-4">
            <select name="category" class="form-select">
                <option value="">All Categories</option>
                <option th:each="cat : ${categories}"
                        th:value="${cat.id}"
                        th:text="${cat.name}"
                        th:selected="${cat.id == selectedCategory}"></option>
            </select>
        </div>
        <div class="col-md-2">
            <button type="submit" class="btn btn-primary w-100">Filter</button>
        </div>
        <div class="col-md-1">
            <a th:href="@{/products}" class="btn btn-outline-secondary w-100">Clear</a>
        </div>
    </form>

    <!-- Flash messages -->
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <!-- Product Grid -->
    <div class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4">
        <div class="col" th:each="product : ${products.content}">
            <div class="card h-100 shadow-sm">
                <img th:src="${product.imageUrl != null ? product.imageUrl : 'https://via.placeholder.com/300x200?text=' + product.name}"
                     class="card-img-top" style="height: 200px; object-fit: cover;" alt="product image">
                <div class="card-body d-flex flex-column">
                    <h6 class="card-title" th:text="${product.name}"></h6>
                    <p class="text-muted small mb-1" th:text="${product.categoryName}"></p>
                    <p class="fw-bold text-primary fs-5 mb-1" th:text="'$' + ${#numbers.formatDecimal(product.price, 1, 2)}"></p>
                    <p class="text-muted small" th:text="'In stock: ' + ${product.stockQuantity}"></p>
                    <div class="mt-auto d-flex gap-2">
                        <a th:href="@{/products/{id}(id=${product.id})}" class="btn btn-outline-primary btn-sm flex-grow-1">View</a>
                        <form sec:authorize="isAuthenticated()" th:action="@{/cart/add}" method="post" class="flex-grow-1">
                            <input type="hidden" name="productId" th:value="${product.id}">
                            <input type="hidden" name="quantity" value="1">
                            <button type="submit" class="btn btn-primary btn-sm w-100"
                                    th:disabled="${product.stockQuantity == 0}">Add to Cart</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Empty state -->
    <div th:if="${products.content.empty}" class="text-center py-5">
        <p class="text-muted fs-5">No products found.</p>
    </div>

    <!-- Pagination -->
    <nav th:if="${products.totalPages > 1}" class="mt-4">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link" th:href="@{/products(page=${currentPage - 1}, category=${selectedCategory}, search=${search})}">Previous</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, products.totalPages - 1)}"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link" th:href="@{/products(page=${i}, category=${selectedCategory}, search=${search})}" th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${currentPage == products.totalPages - 1} ? 'disabled'">
                <a class="page-link" th:href="@{/products(page=${currentPage + 1}, category=${selectedCategory}, search=${search})}">Next</a>
            </li>
        </ul>
    </nav>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
