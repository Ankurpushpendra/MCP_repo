<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${product.name} + ' - ShopApp'">Product - ShopApp</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/products}">Products</a></li>
            <li class="breadcrumb-item active" th:text="${product.name}"></li>
        </ol>
    </nav>

    <div class="row g-4">
        <div class="col-md-5">
            <img th:src="${product.imageUrl != null ? product.imageUrl : 'https://via.placeholder.com/500x400?text=' + product.name}"
                 class="img-fluid rounded shadow" alt="product image">
        </div>
        <div class="col-md-7">
            <h2 th:text="${product.name}"></h2>
            <span class="badge bg-secondary mb-2" th:text="${product.categoryName}"></span>
            <h3 class="text-primary" th:text="'$' + ${#numbers.formatDecimal(product.price, 1, 2)}"></h3>
            <p th:text="${product.description}" class="text-muted mt-2"></p>

            <div class="mb-3">
                <span th:if="${product.stockQuantity > 0}" class="badge bg-success fs-6">
                    In Stock (<span th:text="${product.stockQuantity}"></span> available)
                </span>
                <span th:if="${product.stockQuantity == 0}" class="badge bg-danger fs-6">Out of Stock</span>
            </div>

            <div sec:authorize="isAuthenticated()">
                <form th:action="@{/cart/add}" method="post" class="d-flex gap-2 align-items-center">
                    <input type="hidden" name="productId" th:value="${product.id}">
                    <div class="input-group" style="width: 120px;">
                        <span class="input-group-text">Qty</span>
                        <input type="number" name="quantity" value="1" min="1"
                               th:max="${product.stockQuantity}" class="form-control">
                    </div>
                    <button type="submit" class="btn btn-primary px-4"
                            th:disabled="${product.stockQuantity == 0}">Add to Cart</button>
                </form>
            </div>

            <div sec:authorize="!isAuthenticated()" class="mt-3">
                <a th:href="@{/login}" class="btn btn-outline-primary">Login to Add to Cart</a>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
