<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Order Detail - ShopApp</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/orders}">Orders</a></li>
            <li class="breadcrumb-item active" th:text="'Order #' + ${order.id}"></li>
        </ol>
    </nav>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="row g-4">
        <div class="col-lg-8">
            <div class="card shadow-sm mb-3">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="mb-0" th:text="'Order #' + ${order.id}"></h5>
                    <span class="badge fs-6"
                          th:classappend="${order.status == 'PENDING'} ? 'bg-warning text-dark' :
                                         (${order.status == 'PROCESSING'} ? 'bg-info text-dark' :
                                         (${order.status == 'SHIPPED'} ? 'bg-primary' :
                                         (${order.status == 'DELIVERED'} ? 'bg-success' : 'bg-danger')))"
                          th:text="${order.status}"></span>
                </div>
                <div class="card-body">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Product</th>
                                <th>Qty</th>
                                <th>Unit Price</th>
                                <th>Subtotal</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="item : ${order.orderItems}">
                                <td th:text="${item.productName}"></td>
                                <td th:text="${item.quantity}"></td>
                                <td th:text="'$' + ${#numbers.formatDecimal(item.unitPrice, 1, 2)}"></td>
                                <td th:text="'$' + ${#numbers.formatDecimal(item.subtotal, 1, 2)}"></td>
                            </tr>
                        </tbody>
                        <tfoot>
                            <tr class="table-active fw-bold">
                                <td colspan="3">Total</td>
                                <td th:text="'$' + ${#numbers.formatDecimal(order.totalAmount, 1, 2)}"></td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="card shadow-sm mb-3">
                <div class="card-body">
                    <h6 class="card-title">Order Info</h6>
                    <p class="mb-1"><strong>Date:</strong>
                        <span th:text="${#temporals.format(order.createdAt, 'dd MMM yyyy HH:mm')}"></span>
                    </p>
                    <p class="mb-1"><strong>Shipping Address:</strong></p>
                    <p class="text-muted" th:text="${order.shippingAddress}"></p>
                </div>
            </div>

            <!-- Admin: Update Status -->
            <div class="card shadow-sm" sec:authorize="hasRole('ADMIN')">
                <div class="card-body">
                    <h6 class="card-title">Update Status</h6>
                    <form th:action="@{/admin/orders/{id}/status(id=${order.id})}" method="post">
                        <select name="status" class="form-select mb-2">
                            <option value="PENDING" th:selected="${order.status == 'PENDING'}">Pending</option>
                            <option value="PROCESSING" th:selected="${order.status == 'PROCESSING'}">Processing</option>
                            <option value="SHIPPED" th:selected="${order.status == 'SHIPPED'}">Shipped</option>
                            <option value="DELIVERED" th:selected="${order.status == 'DELIVERED'}">Delivered</option>
                            <option value="CANCELLED" th:selected="${order.status == 'CANCELLED'}">Cancelled</option>
                        </select>
                        <button type="submit" class="btn btn-primary w-100">Update</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
