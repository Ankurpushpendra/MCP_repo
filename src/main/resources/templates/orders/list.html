<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Orders - ShopApp</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
    <h2 class="mb-4">My Orders</h2>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <div th:if="${orders.empty}" class="text-center py-5">
        <h5 class="text-muted">No orders yet</h5>
        <a th:href="@{/products}" class="btn btn-primary mt-3">Start Shopping</a>
    </div>

    <div th:unless="${orders.empty}" class="table-responsive">
        <table class="table table-hover bg-white shadow-sm rounded">
            <thead class="table-dark">
                <tr>
                    <th>Order #</th>
                    <th>Date</th>
                    <th>Items</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="order : ${orders}">
                    <td th:text="'#' + ${order.id}"></td>
                    <td th:text="${#temporals.format(order.createdAt, 'dd MMM yyyy')}"></td>
                    <td th:text="${order.orderItems.size()} + ' item(s)'"></td>
                    <td th:text="'$' + ${#numbers.formatDecimal(order.totalAmount, 1, 2)}"></td>
                    <td>
                        <span class="badge"
                              th:classappend="${order.status == 'PENDING'} ? 'bg-warning text-dark' :
                                             (${order.status == 'PROCESSING'} ? 'bg-info text-dark' :
                                             (${order.status == 'SHIPPED'} ? 'bg-primary' :
                                             (${order.status == 'DELIVERED'} ? 'bg-success' : 'bg-danger')))"
                              th:text="${order.status}"></span>
                    </td>
                    <td>
                        <a th:href="@{/orders/{id}(id=${order.id})}" class="btn btn-outline-primary btn-sm">View</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
