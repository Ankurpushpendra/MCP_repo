<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cart - ShopApp</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
    <h2 class="mb-4">Shopping Cart</h2>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div th:if="${cart.items.empty}" class="text-center py-5">
        <h5 class="text-muted">Your cart is empty</h5>
        <a th:href="@{/products}" class="btn btn-primary mt-3">Continue Shopping</a>
    </div>

    <div th:unless="${cart.items.empty}" class="row">
        <div class="col-lg-8">
            <div class="card shadow-sm mb-3" th:each="item : ${cart.items}">
                <div class="card-body">
                    <div class="row align-items-center">
                        <div class="col-md-2">
                            <img th:src="${item.productImageUrl != null ? item.productImageUrl : 'https://via.placeholder.com/80x80'}"
                                 class="img-fluid rounded" style="height: 70px; object-fit: cover;" alt="product">
                        </div>
                        <div class="col-md-4">
                            <h6 class="mb-0" th:text="${item.productName}"></h6>
                            <small class="text-muted" th:text="'$' + ${#numbers.formatDecimal(item.unitPrice, 1, 2)} + ' each'"></small>
                        </div>
                        <div class="col-md-3">
                            <form th:action="@{/cart/update/{id}(id=${item.id})}" method="post" class="d-flex align-items-center gap-2">
                                <input type="number" name="quantity" th:value="${item.quantity}"
                                       min="1" class="form-control form-control-sm" style="width: 70px;">
                                <button type="submit" class="btn btn-outline-secondary btn-sm">Update</button>
                            </form>
                        </div>
                        <div class="col-md-2 text-end">
                            <span class="fw-bold" th:text="'$' + ${#numbers.formatDecimal(item.subtotal, 1, 2)}"></span>
                        </div>
                        <div class="col-md-1 text-end">
                            <form th:action="@{/cart/remove/{id}(id=${item.id})}" method="post">
                                <button type="submit" class="btn btn-outline-danger btn-sm">✕</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">Order Summary</h5>
                    <hr>
                    <div class="d-flex justify-content-between mb-2">
                        <span>Items (<span th:text="${cart.totalItems}"></span>)</span>
                        <span th:text="'$' + ${#numbers.formatDecimal(cart.totalAmount, 1, 2)}"></span>
                    </div>
                    <div class="d-flex justify-content-between fw-bold fs-5 mt-3">
                        <span>Total</span>
                        <span th:text="'$' + ${#numbers.formatDecimal(cart.totalAmount, 1, 2)}"></span>
                    </div>
                    <hr>
                    <button type="button" class="btn btn-primary w-100" data-bs-toggle="modal" data-bs-target="#checkoutModal">
                        Proceed to Checkout
                    </button>
                    <a th:href="@{/products}" class="btn btn-outline-secondary w-100 mt-2">Continue Shopping</a>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Checkout Modal -->
<div class="modal fade" id="checkoutModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Checkout</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{/cart/checkout}" method="post">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Shipping Address</label>
                        <textarea name="shippingAddress" class="form-control" rows="3"
                                  placeholder="Enter your full shipping address..." required></textarea>
                    </div>
                    <div class="alert alert-info">
                        Total: <strong th:text="'$' + ${#numbers.formatDecimal(cart.totalAmount, 1, 2)}"></strong>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Place Order</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
